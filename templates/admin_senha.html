{% extends "admin_layout.html" %}
{% block title %}Alterar Senha{% endblock %}

{% block content %}
<div style="max-width:420px;margin:2rem auto;">
  <h2 style="font-size:1.25rem;font-weight:800;color:#0d2d6e;margin-bottom:1.5rem;">Alterar Senha</h2>
  <div style="background:#fff;border-radius:16px;padding:2rem;box-shadow:0 2px 16px rgba(0,0,0,.07);">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <label style="display:block;font-size:.82rem;font-weight:600;color:#0d2d6e;margin-bottom:.3rem;">Senha atual</label>
      <input type="password" name="atual" required
             style="width:100%;padding:.7rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:.95rem;margin-bottom:1rem;background:#f4f6fb;" />

      <label style="display:block;font-size:.82rem;font-weight:600;color:#0d2d6e;margin-bottom:.3rem;">Nova senha</label>
      <input type="password" name="nova" required minlength="8"
             style="width:100%;padding:.7rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:.95rem;margin-bottom:1rem;background:#f4f6fb;" />

      <label style="display:block;font-size:.82rem;font-weight:600;color:#0d2d6e;margin-bottom:.3rem;">Confirmar nova senha</label>
      <input type="password" name="confirma" required minlength="8"
             style="width:100%;padding:.7rem 1rem;border:2px solid #e5e7eb;border-radius:10px;font-size:.95rem;margin-bottom:1.5rem;background:#f4f6fb;" />

      {% if erro %}
        <p style="color:#dc2626;font-size:.85rem;margin-bottom:1rem;">{{ erro }}</p>
      {% endif %}

      <button type="submit"
              style="width:100%;background:linear-gradient(135deg,#0d2d6e,#1a4fad);color:#fff;border:none;border-radius:10px;padding:.9rem;font-size:1rem;font-weight:700;cursor:pointer;">
        Salvar nova senha
      </button>
    </form>
  </div>
</div>
{% endblock %}
